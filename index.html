<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Banglalink · Horizon Entry Points</title>
  <style>
    html, body { margin: 0; padding: 0; background: #e9e7e2; }
    body { overflow-x: hidden; }
    * { box-sizing: border-box; }

    .stage { min-height: 100vh; display: flex; justify-content: center; background: #e9e7e2; }

    /* Scaling wrapper: reserves the scaled footprint so there's no dead space below */
    .scaler { position: relative; width: 390px; }

    /* Fixed 390px artboard — the PNG and all Horizon overlays scale together as one unit */
    .canvas { position: relative; width: 390px; background: #ffffff; box-shadow: 0 0 40px rgba(0,0,0,0.12); transform-origin: top left; }

    /* Single full-page static app shell — non-interactive */
    .shell { display: block; width: 390px; height: 2189px; pointer-events: none; user-select: none; -webkit-user-drag: none; }

    /* Interactive Horizon overlays, aligned to the reserved blank rails */
    #HORIZON_ENTRY_1 { position: absolute; top: 585px;  left: 28px; right: 28px; height: 107px; overflow: hidden; z-index: 5; }
    #HORIZON_ENTRY_2 { position: absolute; top: 930px;  left: 25px; right: 0;    height: 205px; overflow: hidden; z-index: 5; }
    #HORIZON_ENTRY_3 { position: absolute; top: 1464px; left: 17px; right: 17px; height: 635px; overflow: hidden; z-index: 5; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="scaler">
    <div class="canvas">
      <img class="shell" src="./bl-empty.png" alt="Banglalink app" draggable="false" />

      <div id="HORIZON_ENTRY_1">
        <div data-horizon-ep="#377585" data-horizon-ep-skeleton="cs"></div>
      </div>

      <div id="HORIZON_ENTRY_2">
        <div data-horizon-ep="#985860" data-horizon-ep-skeleton="rs"></div>
      </div>

      <div id="HORIZON_ENTRY_3">
        <div data-horizon-ep="#143783" data-horizon-ep-skeleton="b4"></div>
      </div>
    </div>
    </div>
  </div>

  <script>
    // Treat the design as a fixed 390px-wide artboard. When the viewport is
    // narrower than 390px, scale the whole artboard (PNG + all Horizon
    // overlays) down proportionally so nothing overflows and the relative
    // layout stays pixel-identical to the iPhone reference.
    (function () {
      var ARTBOARD_W = 390;
      var ARTBOARD_H = 2189;
      var scaler = document.querySelector('.scaler');
      var canvas = document.querySelector('.canvas');
      function fit() {
        var scale = Math.min(1, window.innerWidth / ARTBOARD_W);
        canvas.style.transform = 'scale(' + scale + ')';
        // Reserve the scaled footprint so the page has no trailing blank space.
        scaler.style.width = (ARTBOARD_W * scale) + 'px';
        scaler.style.height = (ARTBOARD_H * scale) + 'px';
      }
      fit();
      window.addEventListener('resize', fit);
      window.addEventListener('orientationchange', fit);
    })();
  </script>

  <!-- Horizon embed — loads once for all three entry points -->
  <script src="https://play.horizonexp.com/embed.js" data-horizon-ref="69359e05b62bd32a6d2ec964"></script>
</body>
</html>
