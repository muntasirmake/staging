<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Banglalink · Horizon Entry Points</title>
  <style>
    html, body { margin: 0; padding: 0; background: #e9e7e2; }
    * { box-sizing: border-box; }

    .frame { max-width: 390px; margin: 0 auto; min-height: 100vh; background: #fff;
      box-shadow: 0 0 40px rgba(0,0,0,0.12); display: flex; flex-direction: column; }

    /* Static PNG slices — exact visual from the original mockup */
    .slice { display: block; width: 100%; height: auto; }
    .slice.s2, .slice.s3 { margin-top: 14px; }   /* section spacing */
    .slice.nav { margin-top: 20px; position: sticky; bottom: 0; z-index: 5; }

    /* Live Horizon embeds — real blocks in the document flow */
    .entry { width: 100%; margin-top: 4px; }
    #HORIZON_ENTRY_1 { padding: 0 24px; }
    #HORIZON_ENTRY_2 { padding: 0 0 0 24px; }   /* left pad only — horizontal cards run to edge */
    #HORIZON_ENTRY_3 { padding: 0 24px; }
  </style>
</head>
<body>
  <div class="frame">

    <!-- Section 1: demo bar + header + hero + 150GB card + bKash Deal Room title -->
    <img class="slice s1" src="./img/section-1.png" alt="Banglalink — bKash Deal Room" />

    <!-- HORIZON_ENTRY_1 -->
    <div class="entry" id="HORIZON_ENTRY_1">
      <div data-horizon-ep="#377585" data-horizon-ep-skeleton="cs"></div>
    </div>

    <!-- Section 2: Banglalink/Daraz promo banner + Daraz Discount Festival title -->
    <img class="slice s2" src="./img/section-2.png" alt="Daraz Discount Festival" />

    <!-- HORIZON_ENTRY_2 -->
    <div class="entry" id="HORIZON_ENTRY_2">
      <div data-horizon-ep="#985860" data-horizon-ep-skeleton="rs"></div>
    </div>

    <!-- Section 3: travel/Banglalink promo banner + Samsung Stories title -->
    <img class="slice s3" src="./img/section-3.png" alt="Samsung Stories" />

    <!-- HORIZON_ENTRY_3 -->
    <div class="entry" id="HORIZON_ENTRY_3">
      <div data-horizon-ep="#143783" data-horizon-ep-skeleton="b4"></div>
    </div>

    <!-- Section 4: bottom navigation -->
    <img class="slice nav" src="./img/section-nav.png" alt="Bottom navigation" />

  </div>

  <!-- Horizon embed — loads once for all three entry points -->
  <script src="https://play.horizonexp.com/embed.js" data-horizon-ref="69359e05b62bd32a6d2ec964"></script>
</body>
</html>
